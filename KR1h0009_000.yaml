body:
  text: 欽定四庫全書經部八孟子音義四書類提要臣等謹案孟子音義二卷宋孫奭撰奭字宗古博平人九經及第官至龍圖閣學士以太子少傅致仕諡曰宣唐陸徳明經典釋文於羣經皆有音義獨缺孟子奭奉勑校定趙岐注因刋正唐張鎰孟子音義及丁公著孟子平音二書兼引陸善經孟子注以為音義上下卷今十三經注疏中孟子正義稱為奭撰朱子語類及王應麟困學紀聞皆言邵武士人所假託奭于音義之外未嘗更作正義今考正義序文其前半即此書之序後半乃稍竄改其詞知正義即縁此書而依託也書中所釋稱一遵趙注而以今本校之多不相符如梁惠王篇上曰集穆曰太平曰譎篇下曰恂曰無墮曰夫將公孫丑篇上曰介者篇下曰素餐曰藉道曰危行曰食功滕文公篇上曰景行曰論語曰力行近仁曰師知篇下曰素餐曰涅曰駢躓曰周公卬思離婁篇上曰踣曰恐粟曰三省曰而錯曰桐子篇下曰不比曰由天曰風諭曰見幾曰好言曰忮曰之行曰行其曰五伯曰辟害曰跌曰汙萬章篇上曰百行曰舍小篇下曰沮溺曰景行曰伊𤼵有莘告子篇上曰長義曰好下曰幾成篇下曰雨雪曰瀌瀌曰見晛曰或折盡心篇上曰逺之曰下賤曰邪辟曰辟若曰蟠辟曰論之曰瞀曰柚梓曰和寡篇下曰逺禍曰惡殺曰舍生曰為之曰造曰臧否曰自遺曰子率曰剖其末孟子篇叙曰其行曰當期曰括凡六十有九條皆今本注文所無惟孟子注之單行者世有傳鈔宋本尚可稽考偽正義刪改其文非復趙岐原書故與音義不相應也因奭是書可以証岐注之舊並可以証奭疏之偽則是書之有功典籍亦不細矣乾隆四十一年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀孟子音義原序夫總羣聖之道者莫大乎六經詔六經之教者莫尚乎孟子自昔仲尼既没戰國初興至化陵遲異端並作儀衍肆其詭辯楊墨飾其淫辭遂致王公納其謀以紛亂於上學者循其踵以蔽惑於下猶洚水懐山時盡昬墊繁蕪塞路孰可芟夷惟孟子挺名世之才秉先覺之志㧞邪樹正髙行厲辭導王化之源以救時弊開聖人之道以斷羣疑其言精而贍其旨淵而通致仲尼之教獨尊於千古非聖賢之倫安能至於此乎其書由炎漢之後盛傳於世為之注者則有趙岐陸善經為之音者則有張鎰丁公著自陸善經已降其所訓説雖小有異同而共宗趙氏今既奉勑校定仍據趙注為本惟是音釋宜在討論臣今詳二家撰録俱未精當張氏則徒分章句漏略頗多丁氏則稍識指歸譌謬時有若非刋正詎可通行謹與尚書虞部員外郎同判國子監臣王旭諸王府侍講太常博士國子監直講臣馬龜符鎮寧軍節度推官國子學説書臣吳易直前江隂軍江隂縣尉國子學説書臣馮元等推究本文參考舊注采諸儒之善削異説之煩證以字書質諸經訓疏其疑滯備其闕遺集成音義二卷雖仰測至言莫窮於奥妙而廣傳博識更俟於發揮謹上欽定四庫全書孟子音義巻上宋孫奭撰孟子題辭張鎰云即序也趙注尚異故不謂之序而謂之題辭也趙氏丁公著云案本傳名岐字邠卿京兆長陵人也初名嘉生於御史臺因字臺卿後避難故改名岐少明經有才藝公府屢辟為京兆尹延篤功曹先是岐常貶議中常侍唐珩兄玹為京兆尹岐遂避難四方無所不歴及諸唐滅乃出仕歴并州刺史議郎後以老病就拜太常九十餘建安六年卒通稱丁云稱去聲下有此字以意讀之邾陟輸切所并必正切下同長師張丈切縱音蹤隳許規切墨翟音狄後墨翟皆倣此壅底張云音邸言否塞不通也迂音紆又音于值炎丁作直音值信三音伸詒後丁云音義與貽同難疑乃旦切繫本亦作系同胡計切錧鎋丁云上音管方言作輨車釭也下音黠車轄也衿音今問陳直刄切毁鬲丁音隔蓋譖毁之使情隔耳又音歴焉能於䖍切依放方往切遂絀音黜罷傳直戀切下經傳同心勦下子小切絶也形瘵側界切病也弛擔音豕下都濫切睠音眷漂撫昭切亂思張云亂治也思去聲緼奥於粉切淵奥也章别後列切梁恵王章句上丁云案史記梁恵王魏武侯之子名罃罃音鸎凡七章以為于偽切下為王為其曰為抑為為是故為皆同放於方往切夷羿音詣羿夷姓饜一鹽切又於豔切復申扶又切下章注同重嗟直用切下申重重言皆同亦樂音洛盡此卷皆同王好呼報切下好戰同集穆張云當為輯穆夸咤丁丑嫁切云誇也玉篇作詫規度大各切下忖度同亟音棘不督音篤丁作子六切來趣丁音趨亦如字麀音憂鶴鶴張云詩本作翯翯户角切古字假借今依詩本音於牣於如字下音刄丁本作仍歡樂本亦作勸樂害䘮如字張音曷書作曷䘮及女音汝大平丁音泰下有此字以意求之填然音田者不方乆切後皆放此直不如字丁音值勝食音升下同數罟七欲切網也丁張音朔下音古洿音鳥䘮死丁如字衣帛於既切注及下文衣帛同數口丁色主反不王者丁云去聲下文以意讀之風王音諷餓莩平表切義同殍字丁張毗小切莩有梅毗小切又平表切丁云韓詩也詩作摽與莩同刺人七亦切又七四切改行下孟切下徳行同以梃丁徒頂切從木惡之烏路切注及下夫惡同惡在音烏惡猶安也下惡乎定惡知皆同俑音勇夫惡音扶此字既多可以意求疑者别出死邪以嗟切後不音者皆倣此長子張丈切下長上長者皆同洒之丁音洗謂洗雪其恥也省刑所梗切税斂丁力劔切易耨以䜴切下奴豆切字亦作蓐音同以養餘亮切語人魚據切下語人同卒然七没切槁音考沛字亦作霈普盖切浡音勃由水由與猶同古字通用宓音伏戯音羲齕恨没切釁許覲切舍之音捨觳觫丁斛速二音恐貌鐘與音餘下何與心與聞與甚與口與體與目與前與皆同郄音隙大祝音泰墮許規切逺庖于萬切王説音悦挾音恊以超超或作趨折枝之舌切趙云折枝按摩折手節解罷枝也陸善經云折枝折草樹枝罷枝音疲少者詩妙切以御如字鄭箋詩云御治也思齊音齋適妻丁亦切好惡皆去聲度之待各切注稱度度心度物皆同餘並音渡便嬖婢緜切下音臂辟土音闢賈音古愬音訴惽音昬放辟音僻邪侈張尺氏切丁作移為已音以絶句罔民張如字丁作司民下音同焉有於䖍切以畜許六切當章丁浪切譎音決梁恵王章句下凡十六章暴見賢徧切下他日見及後注虹見皆同王語丁音御下嘗語同好樂呼報切此卷内皆同惟下注美好如字愠於問切恚一睡切與民同樂音洛聞與音餘下病與慎與鼎與皆同獨樂樂丁上音岳下音洛下文及注樂樂皆同孰樂音洛此章内孰樂樂邪樂也同樂樂其字皆同餘並音岳為王于偽切下同舉疾首蹙頞丁云舉猶皆也屬下句蹙子六切頞音遏隙綺㦸切何惡烏路切下讒惡同於傳直戀切下同蕘音饒刈音乂為阱才性切混夷丁音昆昆夷犬戎别名喙許穢切困也大王音泰後大師大王皆放此獯鬻丁云上音熏下音育夏曰獯鬻商曰鬼方周曰獫狁秦漢曰匈奴魏曰突厥勾踐古侯切㑹音鱠夫差音扶樂天音洛此卷内惟下文相説之樂及注樂師樂章樂詩樂正皆音岳餘並皆音洛彼惡音烏瞋尺真切書曰天降下民至越厥志丁曰注云尚書逸篇也案今尚書太誓有此文但三五字詳略不同耳此注云逸書者古文太誓自孔安國注遭巫蠱事亦遂寢藏於私家故先儒鄭康成馬季長杜元凱等皆以為逸書故此注亦云逸書不見古文也衡行丁音横云詳注意即依字從欲丁音縱本亦作縱為之赴難為難二字並去聲朝儛音舞放方往反琅音郎邪以嗟切王觀丁音貫亦如字其相息亮切下相土同春省息井切下同從容七容切睊睊字亦作張古縣切云側目視貌言睊睊然怒目相嫉而相讒也慝吐得切湎彌兖切蹯音煩行也下孟切下之行同無厭丁一兼切公説音悦下相説臣説皆同徴招張音韶下同畜君許六切下注子畜同孥音奴譏難乃旦切下狄難之難赴難其難免難皆同惡惡烏路切下如字哿矣工可切煢音瓊糇音侯橐音託思戢詩作輯同音集啓行如字道也裹盛音成滸音虎恂音荀比其丁必二切及也無墮許規切亦音惰下不墮同舎之音捨下舍女同防比毗志切核音覈惡直如字又烏路切大辟婢亦切舎女音汝人少詩妙切鎰音溢簞食音丹下音嗣後簞食皆倣此霓五稽切徯胡禮切係累張音繫下力追切并燕音併下并得同旄倪丁云上音髦下音齯老也詳注意倪謂繄倪小兒也繄鳥兮切夫將丁音扶屬下句魯閧張胡弄切云鬬聲從門下者下降切義與巷同此字從門丁豆切與門不同丁又胡降切劉熈曰閧構也構兵以鬬也説文云鬬也長上張丈切下其長長者皆同軍率所類切忿敷吻切阨音厄無已音以以偪音逼以遺去聲貉音鶴乃屬丁音燭㑹聚也鼎與音餘曰否方乆切本亦作不音同後不音者皆倣此沮慈吕切本亦作阻各随字讀之尼之女乙切郭璞注爾雅引孟子作此字丁本作㞐云居字焉能於䖍切公孫丑章句上凡九章可復扶又切下同蹵子六切踧同踖子亦切艴丁音勃張音拂何曽丁音憎則也乃也愠於問切不帥音率重言直用切為我于偽切注及後章非為皆同為與音餘下法與聞與同與皆同以齊王張于況切云此字既多可以義詳由反手丁云義當作猶猶如也古字借用耳下文由弓人由矢人義同易然以䜴切丁朝音潮膠鬲丁隔歴二音輔相息亮切丁本作押音甲廣雅云輔也義與夾同鎡基鎡或作兹音同改辟音闢郵丁音尤今之驛也畏難乃旦切我四十不動心楊子曰請問孟軻之勇曰勇於義而果於徳不以貧富貴賤死生動其心於勇也其庶乎賁音奔黝伊糾切橈丁奴効切百行下孟切下之行徳行随行皆同要之音邀後以要同子好呼報切下好殘所好皆同吾不惴焉之睡切丁本作遄云音揣恐懼也之帥所類切或音率注同本亦作師度大各切蹶音厥又居衛切顛倒字或作傎音同惡乎音烏下曰惡同所趨音趣下同無是餒也奴罪切陸云言以道義配之則能充塞無是餒也慊口簟切助長張丈切注及下不長苗長長天下皆同揠烏八切拔也芒芒丁音忙亟音棘疾也罷音皮舎之丁張並音捨下舍是舍己皆同詖彼寄切自斷丁音短以譽音餘亦音豫下譽之同麗姬吕支切邪辟音僻廋音捜説辭張音税丁又依字夫聖音扶屬下句汙丁音蛙不平貌垤大結切行潦音老大過音泰後章注大宰及章末大隘其大皆同惡辱烏路切章内文注及後章非惡皆同榮樂音洛下文般樂樂為樂聞樂取皆同居埤音卑閒暇音閑徹直列反桑土丁音杜綢繆音稠下武彪切鴟處脂切鴞于嬌切般樂音盤怠敖五勞切又五到切孼魚列切不可活如字丁云尚書作逭音換下離婁篇同雊古候切㕓直連切願藏或作臧音藏不横去聲氓或作萌或作甿皆音肓怵惕音黜内交張音納本亦作納羞惡丁烏故切又如字為行下孟切擴丁音郭張大也字亦作彍音霍函音含鎧苦愛切又苦亥切祝丁亦音呪蚤售音早授不中張仲切讜音黨直言也書作昌推惡此章惟此字烏路切餘知字浼張莫罪切丁亡但切説文曰汙也方言曰東齊之間謂汙曰浼汙也烏故切下文同就已音以注同遺佚音義與逸同或作迭或作失皆音逸阨窮音厄本亦作厄袒裼裸裎袒音但裼音錫裸郎果切裎音程並露也裎亦作程焉能於䖍切懣也音滿又摸本切本亦作滿援而止之或作正之憚徒案切儷音麗絀音黜伯夷隘或作阸或作阨並烏懈切彈正音壇介者丁云字多作分誤也公孫丑章句下凡十四章王相二字並去聲和樂音洛下樂道樂義皆同不下丁去聲後注下士同馮皮冰切寡助之至至或作主畔之張云與叛同惡寒烏路切造朝七到切下同之從才用切數人要丁上色主切下音邀曰惡音烏注及下惡得曰惡惡知皆同宜與丁音餘下是與死與言與伐與殺與之與過與皆同此宜與亦如字慊口簟切長民張丈切注及下長者同好呼報切下同餽音饋後皆倣此贐囚刄切為兵于偽切下必為之為王為其所以為為我為孟下為子為皆同可鬻本或作育音同有處昌吕切下同焉有於䖍切則去之起吕切其行胡郎切幾千丁蟣祈二音賑丁音振素餐七丹切蚔音遲鼃丁烏花切張烏媧切先後丁云並去聲一毋使音無不中張仲切藉道本亦作籍蓋大夫古盍切王驩音歡同使所吏切相比毗志切亦如字曰夫音扶注夫人同危行下孟切稱之尺證切翣山洽切辟世音避度而大各切不可稱丁如字且比丁音庇及也恔乎音效方言云快也丁音皎説文云憭也沈同張音審或作沉誤子噲苦壞切燕易王子監古咸切更也古衡切龍斷趙云龍斷謂堁斷而髙者丁云案龍與隆聲相近隆髙也蓋古人之言耳如胥須之類也張云斷如字或讀知斷割之斷非也陸云龍斷謂岡壟斷而高者如陸之釋則龍音壟堁丁云廣雅音課開元文字音塊隱几於靳切據也齊宿側皆切字亦作齋語子魚據切魯繆音穆愠於問切豈舎音捨下舍我同悻悻丁云字當作婞形頂切很也直也又胡耿切字或作􅬝􅬝然論語音鏗見於丁音現狷古縣切恚一睡切宿留上音秀下音霤食功丁音嗣滕文公章句上凡五章使於所吏切考公麇居筠切從禾相直音值復見扶又切重受直用切下同見古筧切間一音閑瞑眩莫甸切下音縣又作眠眗音同瞑眩憒亂瞑或作傎即音顛憒古對切又音潰景行下孟切下忘行孝行並同論語曰力行近仁丁云近音附近案論語無此語是禮記中庸篇趙氏以為論語文之誤也齊音資䟽所居切飦諸延切縗或作衰同音崔􅪪字亦作音義與糜同更也古衡切好馳呼報切下好者好聚好施皆同為我于偽切下既為復為為天下親為非為皆同歠川悦切帥音率督趣丁音促于茅張云或作苗誤也索綯桑落切下音桃亟其乘屋丁云亟音棘乗登也閒暇音閑放辟音僻後放辟同邪侈張云諸本作移誤也罔民張云或作司誤也徹直列切受禪音擅校數色主切有易丁以豉切下及後章不易同樂歲音洛棄捐與専切盻盻説文五禮切恨視也亦四莧切丁作肸許乙切以養餘亮切下莫養奉養皆同稱貸並如字惡在音烏安也後章惡得惡能皆同養食音嗣未任音壬雨我于付切學校音效下同射也神夜切各去起吕切汙吏烏路切又音烏長爭張丈切絀音黜田萊音來草田曰萊夫圭田丁云夫如字謂餘夫也鄭康成注禮記訓夫為治也磽苦交切别野彼列切下有别同勠音六師知音智許行丁音衡又下孟切下同踵之隴切氓亡庚切與甿同衣褐於既切下同捆屨丁音閫案許叔重曰捆織也埤倉曰捆􅥚也從才從木者誤也張作裍音同叩㧻丁音卓擊也從才旁豕陳相丁云去平並通饔音雍飱音孫當身丁去聲粗布音麤後注同之與音餘下為與同舎皆丁音赦止也路也丁張並云路與露同羸路力為切字亦作羸郎果切食人音嗣食於人如字氾濫音泛偪音逼瀹濟漯丁云上音藥中子禮切下他合切作濕誤也􅈱音孤使契音薛放勲方往切曰丁音馹或作日誤勞之來之丁云並去聲不與焉下音豫亦如字倍之丁云義當作偝古字借用耳下子倍同治任丁而針切云治任謂治擔任之具强其丈切暴之蒲木切皜音杲質放丁方往切倣像似鴃舌丁音決又古役切鳴鴃丁云毛詩作鵙古役切大古音泰閟宫丁音秘清浄之宫謂姜嫄之廟膺擊丁本作應云案古訓應訓當此注訓擊盖以當對是擊敵之義故轉訓耳懲艾丁廢切市賈音嫁下皆同倍蓰丁音師云從竹下徙開元禮文字音義曰倍謂半倍而益之又音灑山綺切史記作倍灑徐廣曰一作五倍曰蓰子比丁音鼻次比也徐辟音壁又音闢道不見丁音現注不見同匍音蒲匐蒲北切蠅蜹姑張音汭云諸本或作䗜誤也丁云䗜未詳所出或以䗜與䖻同謂蜉䖻也音由又一説云䗜姑即螻姑也嘬楚怪切説文云飲歃也有泚七禮切睨音詣虆梩丁力追切土籠也或作虆下力知切土轝也籠臿楚洽切鍬也憮音武滕文公章句下凡十章志曰丁云志記也謂志記之言也介音界丁云謂狷介也信道音伸為與音餘下食與善與築與樹與皆同要利音邀下章要其同奚乘音剰下同强而其丈切注同射之食亦切範我或作范氏范氏古之善御者詭遇陸云詭遇詭計以要禽也舍矢音捨下舎其同不貫丁音慣注貫習同中之張仲切貫臧如字者比毗志切下同熄音息從横音蹤下從長合從皆同從長張丈切下長幼長逸皆同焉得於䖍切安也之冠音貫女家音汝出疆音姜載質張音贄云義與贄同以見音現下注願見同粢音咨盛音成繅素刀切皿武永切藉秦昔切腯徒忽切絀音黜為出于偽切下為之為其為匹夫為此皆同難仕丁乃憚切又如字媒妁音酌丁云謂媒氏酌二姓之可否故謂之媒妁也隙去逆切又惡烏路切下又惡楚惡惡無禮皆同彭更古衡切從者才用切傳食丁直戀切言轉食也簞食音嗣此章内文注可食而食食志食功食乎子食不食皆同餘皆如字笥相吏切羨似面切又余見切畫音獲墁張武安切云與謾同素餐七丹切亳音薄遺之惟季切餉式亮切徯胡禮切匪厥丁云義當作篚篚以盛贄幣此作匪古字借用下同救字或作捄同咻之音休嚾也丁云案玉篇音嚻召呼也今釋注意音歡為便盖字讙譁同湼奴結切辟之音避不内音納繆公音穆矙或作瞰同音勘使人所吏切脅虚業切又許及切畦胡圭切竦音聳强其丈切赧女簡切去闗起吕切攘如羊切子好呼報切下注及文皆同汜孚劔切埤音卑度之大各切洚水張音絳又下江切丁胡貢切説文胡工切洚洞丁云案玉篇下江切從夅夅下江切今注宜音胡貢切從夆夆音逢浲洪水也下徒送切又音同菹側魚切丁音嗟既逺丁于願切壞宫音怪汙音烏邪説如字張音税暴行張下孟切注及下詖行操行皆同沛丁蒲内切更興音庚放辟音僻相武息亮切素王于况切又如字横議去聲為我于偽切莩皮表切或作􅣻或作殍皆同丁音孚詖音賁駢躓蒲田切下張尼切丁云史記作胼胝謂手足生胝也此躓乃顛躓字音致義依史書讀之乃便周公卬思案字書卬讀如仰又離婁下章云周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦是其事也螬音曹匍音蒲匐蒲北切咽音宴擘博厄切惡能音烏下惡用同辟音劈纑音盧戴蓋丁張並音盍䳘張云與鵞同已頻顣丁上音紀頻亦作顰嚬同下子六切鶃鶃丁五歴切鵞也哇丁張並於佳切母食音嗣離婁章句上黄帝亡其𤣥珠丁案荘子以𤣥珠喻𤣥妙至道耳非實亡其珠也簇音湊姑洗音銑無射音亦徴陟里切仁聞音問注同嘉樂丁云案詩作假樂假音暇樂音洛衣於既切揆度大各切後章注不度同度量丁並去聲僥古堯切甲兵或作鉀音同不辟音闢方蹶俱衛切泄泄弋制切沓沓徒合切動女音汝厲王流於彘丁音滯韋昭曰彘晉地漢為縣屬河東案史記周厲王立三十年暴虐侈敖國人謗王王殺謗者三十四年民莫敢言道路以目三年乃襲王王奔彘戲音羲避逺于願切惡死烏故切下惡醉喻惡皆同而樂音洛此卷内皆放此惟後章樂正樂之實禮樂即音岳强酒其丈切下注同治人不治張云上直之切將理之義也下直吏切已理之義也後皆倣此行有張下孟切改行之行正行皆同踣朋北切沛普害切能令力政切而女丁去聲以女妻人曰女祼音灌暢丁云謂鬯酒也好仁呼報切下好仁好為皆同以濯張直角切丁作瀹音藥其菑音災滄浪音郎夫人音扶下同孼魚列切恐栗丁云義當作慄古字借用走壙張音奏下音曠為淵于偽切下為叢為湯為之為無後皆同敺音驅鸇諸延切埤音卑獱音頻獺别名卒求千忽切後章卒至同舎正音捨注同長其長並張丈切注及下同三省息井切焉往於䖍切下章焉廋同辟草音闢任土如禁切合從音蹤眸音牟瞭音了眊音耄廋音搜惡得音烏卷末烏可已也音同而錯音措髠音坤禮與音餘援音爰養親餘亮切下同晳先歴切徹直列切與適丁音謫注同足間古莧切非訧音尤君難乃旦切易其以䜴切桐子音義與童字同子敖五高切見孟張音現使而所吏切亟見音棘餔張博孤切亦音哺啜昌悦切厎之爾切孟子音義巻上欽定四庫全書孟子音義巻下宋孫奭撰離婁章句下凡三十二章畎夷始犬切或音犬書曰太子發上祭于畢下至盟音孟津丁云案古文尚書無此文先儒以為此文是偽泰誓也酆音豐鎬音浩度量音杜亮不比毗志切近也乘輿音剰注同溱音臻洧榮羙切杠張音江方橋也可通徒行人過者辟人丁張並音闢亦如字注辟除同焉得於䖍切卑辟音避由天丁云由義當作猶猶如也古字通用後皆倣此禮為于偽切下為服為之為父為其為得為武皆同田菜丁云菜謂菜地菜之言采也故禮曰大夫有采以處其子孫下於下去聲搏執音博極之張紀力切又如字惡而烏故切下惡傷禹惡皆同風諭音諷見幾音機微也謂禍福之兆也陳質本亦作賈藉交慈夜切樂有音洛下其樂而樂同相覺丁音教云義當作校有惡如字惡人烏路切下所惡無惡心惡皆同難及乃旦切下濟難同好言呼報切下好之而好好貨好勇皆同忮支義切之行下孟切下行之本行髙行行惡皆同行其如字養生張餘亮切注及下養親之養得養皆同深造七報切五伯如字丁云伯者長也言為諸侯之長亦音霸當直音值下同亟稱去吏切徐辟音嬖又音闢舎音捨放乎方往切澮古外切涸下各切潦音老卒千忽切聲聞音問强仁其丈切辟害音避讜言丁音黨尚書作昌言泄爾丁案注云泄狎也案媟訓狎今注以泄訓狎借聲訓耳熄與息同之乘丁音剰云晉名春秋為乗者取其善惡無不載檮杌丁逃兀二音檮杌惡獸名也楚謂春秋為檮杌者在記惡而興善也跌徒結切汙音烏逄蒙丁張並薄江切從夅夅下江切惡得音烏之他張徒何切邪辟音僻乘矢丁音剰乘矢四矢桮音杯棬丘園切驩音歡敖五高切脅虚業切又許及切何難乃旦切下難矣之難其難赴乃死難皆同我由丁云由與猶義同後皆倣此很胡懇切惰解音懈與焉音預注不與同瞷夫古莧切又音閑饜於艶切蚤音早施從丁音迤注同張音易謂廷施而往也墦燔潘二音訕所宴切施施丁依字詩曰將其來施施張音怡扁扁丁毗緜切萬章章句上凡九章見惡烏路切下惡之惡已皆同是恝張古黠切丁音界説文作􅢚忽也許介切為言于偽切下因為為不順為楚所為主當為皆同共為音供求禪音擅後皆倣此不見音現此章及下見瞽皆同人少詩妙切知好此章惟此字呼報切餘並如字衣五於既切匍音蒲匐蒲北切百行下孟切下行莫之行皆同懟直類切妻舜七祭切下妻也妻之同捐音縁又音旋浚音峻揜張云與掩同弤都禮切丁音彫云義與弴同彫弓如字或作彤誤忸女六切怩音尼愕五各切已與音餘注及下者與皆同校人張音效丁音教畜之許六切僑音喬重言直用切舎小音捨庳音鼻史記作鼻驩音歡堯帥音率下同蹙子六切岌魚及切踖子亦切勛音勲得養餘亮切下皆同興事去聲諄諄之純切以行張去聲下行歸惡行皆同此以行亦如字暴之步卜切露也簒楚患切施澤所䜴切横為胡孟切自艾音刈治也要湯音邀下要而以要皆同莘所巾切而樂音洛下同覦音俞眄莫甸切囂囂五高切又許驕切幡張云與翻同推而丁土回切亦如字下卷同内之張音納下卷同説之如字亦音税浼我音毎伊訓曰天誅造攻自牧宫朕載自亳丁曰注云伊訓尚書逸篇不見古文耳今文尚書伊訓曰造攻自鳴條朕哉自亳與此文小異癰於容切疽七余切好事呼報切下及卷末自好好名皆同讎由張音醜之平聲亦如字阨音厄魋杜囘切阨難乃旦切鬻音育食牛音嗣繆公音穆羖音古屈産九勿切之乘音剰時舎音捨萬章章句下凡七章横政丁胡孟切下同横民横或作緫各依本字讀行不下孟切下之行行夜皆同不與音豫佚音逸阨音厄袒音但裼音錫裸郎果切裎音程焉能於䖍切浼張音毎丁音漫接淅接如字淅丁張並先歴切漬米也説文接作滰云浚乾漬米也從水竟聲孟子曰夫子去齊滰淅而行其兩切浚音峻瀝也亟也紀力切動中張仲切下其中中也皆同始條理本亦作治條理下同有殺所界切不橈奴教切强増其丈切錡魚綺切惡其烏路切注憎惡同采地音菜食九音嗣下文及注食九并下章䟽食皆同佃音甸挾長音協下張丈切注同費恵音袐顔般音班造之七到切糲盧葛切迭為徒結切張云或作佚誤更迭音庚妻舜七計切郤之正體却字下皆同或作郤誤餽音饋下皆同禦與音余下道與召與非與皆同不譈徒對切將比丁毗失切云比地而誅猶言比屋而誅也亦毗志切獵較丁張並音角簿正丁步古切本多作薄誤可卒千忽切度珍丁大各切為之于偽切下為貧為養本為何為也哉為欲為其皆同宿留音秀下音霤為養餘亮切惡乎音烏後章賢惡同柝音託椎直追切㑹計古外切乘田音剰茁阻刮切壯長張丈切委積於偽切下子智切當直音值葭音加稱職尺證切氓音萌繆公音穆亟問去吏切卷内並同摽使音杓又音抛下所吏切數問音朔下同愠於問切猥於賄切二女女焉張云上如字下去聲傳質丁讀如贄敢見音現注及下往見見君皆同如底詩作砥同之履切沮溺七餘切好善呼報切下同景行下孟切伊發有莘所巾切為殷興道丁云言伊尹有莘之媵臣𤼵起於草萊為殷湯興其王道也告子章句上凡二十章桮棬音杯下丘園切張云屈木為之也丁云方言曰海岱之間謂盌為棬盌音椀柜丁音舉戕音牆義與音餘下白與也與性與長與外與非與謂與若與皆同長義張丈切下不出者皆同拂之丁扶勿切戾也下曲拂同此拂之亦如字湍他端切陸云湍波流也無分如字丁扶問切下同瀠字書作瀠余傾切波勢回貌搏之張補各切云以手擊水丁作摶音團顙蘇黨切好下呼報切卷内皆同惟下注好人好耳如字耆秦音嗜本亦作嗜下同炙之夜切惡在音烏而强其丈切羞惡丁烏故切舎則音捨下舍魚舍生舍其舍貴舍大皆同倍蓰音師又音灑山綺切觧見滕文公章句阨音厄麰音牟耰丁音憂壅苗根也浡音勃磽苦交切相覺丁音教義訓為校蕢音匱姣也古卯切狂且丁子餘切云且助句辭櫱五割切好惡丁呼報切下烏路切下所惡同有梏亡之丁云梏古沃切謂悔吝利害也言利害之亂其性猶桎梏之刑其身故喻之之行下孟切下其行同易生以䜴切暴之步卜切繳音灼射之食亦切為是于偽切下為宫同熊蹯音煩不辟音避下同嘑呼故切蹴爾張取六切或作雖音同咄啐丁都忽切叱也下七内切呼也不辯丁本作變云於義當為辯辯别也得我與張云平聲亦如字鄉為丁云並去聲下今為為指鄉為其但為亦為皆同不信音伸下同惡之烏路切下同溉古代切檟音賈樲音貳樂善音洛下自樂而樂皆同以要音邀注及下同令聞音問不熄音息荑音蹄稗蒲賣切幾成丁音祈又音幾彀古候切用思丁息二切告子章句下凡十六章任人張音壬親迎張魚慶切下同人難乃旦切巻末可難同曰於丁張並音烏歎辭也斷句揣初委切奚翅張云翅與啻同古字通用施智切紾張音軫又徒展切摟音婁後章同以長張如字匹雛張如字下士于切丁作疋雛云案注云疋雛小雛也即疋訓小而詁訓及諸書疋訓耦訓小無文今案方言疋小也音節蓋與疋字相似後人傳寫誤耳後長張丈切下先長年長長君皆同之行下孟切下堯行桀行之行循行身行過行皆同得見音現下享見見顔見於皆同較音角小弁音盤下同為詩丁云為猶解説也闗弓丁張並音彎而射食亦切下同重言直用切邶風音佩可磯音機墐音僅丁云路旁冡也宋牼口莖切説而音税下皆同將為于偽切下為其為人自為為湯城為之皆同樂罷音洛下樂聞樂賢安樂皆同閒矣音閑相與息亮切下為相相得皆同下音餘下得與同隙去逆切身造七到切髠音坤不惡烏路切下所惡惡為皆同汚烏路切其趨張讀如趣言其趣向正道無異也下注同繆公音穆下注秦穆同華周胡化切注同不税音脱注同以為為肉下為字于偽切下為無為君為魯一戰為君為惡為之為人奚為皆同膊炙普各切下之石切五霸丁云案先儒説五霸不同有以夏伯昆吾商伯大彭豕韋周伯齊桓晉文為五霸今此注以齊桓晉文秦穆宋襄楚莊為五霸地辟音闢下辟土同掊克丁薄侯切深也聚斂也歃所洽切糴音狄于好呼報切下好戰好善皆同長君張丈切丁又如字滑釐丁張並音骨下力之切鄉道音向下同變更音庚貉音陌饔飧音雍孫洚水張音絳又下江切丁胡貢切惡乎執音烏本亦無乎字舎信音捨有知音智訑訑張吐禾切云蓋言辭不正欺罔於人自誇大之貌丁云此字音他又達可切説文云欺也字作訑者音怡訑訑自足其智不嗜善言之貌今諸本皆作訑即不合註意當借讀為􅑲音怡見顔音現下見於同雨雪于付切瀌瀌符驕切又彼苗切見晛如字丁音現下奴見切周之與賙同救贍也傅説音悦後卷傅説皆倣此膠鬲張音隔拂亂丁音佛忍性張如字丁音刄注同鬻字或作育音同曽益張云曽與増同丁云依注曽讀當作増依字訓義亦通也瘁音萃屈九勿切拂音弼知生丁依注音智注同陸如字云言憂患者以生全安樂者得死亡也或折丁之設切盡心章句上凡四十七章共之求用切亦作拱居勇切好生呼報切下所好好善好以好利好仁之好皆同行與下孟切下之行改行善行行有百行皆同殀與夭同命有三名丁云案此三命事出孝經援神契壓烏甲切逺之于願切下逺辱同舍則音捨下是舍舍大皆同樂莫音洛下樂在樂善樂其所樂樂道樂義之樂樂風樂為而樂樂而三樂樂也所樂樂之皆同以錯音措亟見去吏切下同數也音朔下同下賤去聲宋句古侯切語子魚據切囂囂五高反又許驕切不離力智切下同見於音現才知音智下術智同邪辟音僻欿然張音坎字林云欲得也今詳此義内顧不足而有所然也下注滿欿同亟其音棘大辟音闢驩虞丁云義當作歡娛古字通用耳皥皥張云皥與昊同説文胡老切義與浩同古字通用所過者化所存者神陸云言君子所過人者在於政化存其身者在於神明襁褓丁紀享切説文云負兒衣也博物志曰織縷為之廣八寸長一尺二寸以負小兒於背上下音保聲類曰褓者小兒被子也少知詩妙切下少而同長知張丈切下敬長挾長皆同辟若丁音譬下辟若同疢丑刄切孼魚列切王天于况切不與音豫怍音昨重言直用切分定扶問切下之分同睟然見丁上音粹下音現盎張烏曩切下注同又烏浪切陸云盎於背如負之於背蟠辟音盤下音闢辟紂音避衣帛於既切易其以䜴切輕施始豉切焉有於䖍切小郄丁去逆切義與隙同孳張云與孜同古字通用下文同蹠張云蹠與跖同之石切别之彼列切為我于偽切注為已及下為其為之不為皆同放踵丁方往切至也下之隴切摩突丁徒忽切穿突也子莫執中陸云言子等無執中所惡烏路切注同强甘其丈切其介陸云介謂特立之行掘衢物切又其月切軔丁音刄云義與仭同借用耳先儒以七尺為仭注云八尺曰軔論之一簣丁音匱論謂論語也惡知音烏下惡在惡得皆同放與音餘下禁與予與皆同宿留音秀霤素餐七丹切墊丁念切陶音姚敝蹝所綺切注皆同訢音忻喟邱愧切乘服音剰呼於丁火故切垤大結切瞀丁云案開元文字音茂目不明也張亡角切食而丁音嗣畜之張許六切蕣音舜柚􅯗丁云上以究切似橙而醋下音臻從木莘字亦作榛榛似栗而小引此二物者皆謂内不稱外紾音軫又徒展切漸漬子亷切亦如字達財陸云達財周恤之一本作才説云以有善才就開其性理也淑艾丁音刈治也張五泰切養也幾及音機彀率古候切丁云率循也謂彀張其弩又當循其射道令必中於表陸云率法也躍如心願中也能者從之當勤求也則讀為律躍如也丁云躍如猶言卓爾陸云躍如心願中和寡胡卧切滕更張音庚挾音協知者音智注知者及下文之知皆同不徧正體遍字歠昌悦切盡心章句下凡三十七章王好呼報切下好戰好仁好生好名之好好禮好善皆同卒少子忽切後章注卒以同長子張丈切相覺音教義與校同為陳音陣百兩丁音亮虎賁丁音奔先儒言如猛虎之奔焉用於䖍切贅衣丁之税切趣馬千走切頟角屖厥地丁云頟即額字屖音西義與棲遲同息也久也字從尸下辛或作犀牛字誤也糗去久切茹音汝袗衣之忍切陸云袗衣之美者糒音備丁音敗袗畫胡卦切下同一間張音澗亦如字逺禍于願切惡殺烏路切下惡似惡莠惡佞惡利惡鄭惡紫惡鄉所惡皆同舎生音捨下舍而舍其舎身皆同見於音現下注見上同魭羮丁音元左傳作黿庳音鼻皆樂音洛下樂其樂者樂道般樂皆同之行下孟切下之行德行正行穢行人行行與其行汚行皆同更古衡切下同盛音成腯徒忽切勲炙字與熏同接淅先歴切解見萬章章句戹於或作厄同貉稽丁云貊鶴二音既是人姓當音鶴纂文曰俗人姓也張亡百切説文云北方人豸種也訕所諌切殄徒典切蹊間張如字為間皆如字注同鄉道音嚮追蠡音堆下音禮鈕音紐兩馬如字丁云古人駕車以兩馬軌謂限之轍迹也孟子意言城門限迹切深以日久逺為車所轢多故也豈是一時兩馬駕車而過之使然力與音餘下来與同搏補各切嵎音愚攖丁於盈切從手埤蒼云攖梏也此注云迫也依陬子于切又子侯切隅也解倦音懈從欲音縱又如字知之音智注明知學知小知皆同王於于况切亹亹音尾不意音億又如字為之于偽切下為已是為本為非為皆同苙丁音立欄也圈也蘭與欄字同罥涓兖切謂羈其足也横興胡孟切下横暴同紩音秩鎧苦愛切又苦亥切斯養斯義同厮賤役也有殍皮表切張音孚從者才用切下從車同廋或作廀同音搜屝符費切造七報切餂之丁曰注云餂取也今案字書及諸書並無此餂字郭璞方言注云音忝謂挑取物也其字從金今此字從食與方言不同盖傳寫誤也學者宜詳本亦作䬯奴兼切臧否音鄙不與音豫下與並同中禮張仲切或如字說大音税下注同藐之丁音懇藐然輕易之貌又音眇魏魏音巍丁云當作巍榱題丁楚危切爾雅曰桷謂之榱題也屋霤力救切汰音泰般樂音盤自遺以醉切單豹音善黶乙斬切晳音錫不復扶又切炙之夜切狂獧丁音絹與狷同踸踔丁勑甚切下勑効切又勑角切譎音決詭過委切嘐嘐火包切重言直用切下同言不顧行行不顧言古之人行張云三行並去聲注及下行合為行之行士行皆同何為踽踽張云為于偽切踽俱禹切為又如字閹然音奄不解音蟹汙世音烏又烏故切莠音誘慝吐得切子率如字又所類反虺虚鬼切散宜素但切尚父如字為將即亮切然而無有乎爾則亦無有乎爾陸本作然而無乎爾則亦有乎爾云孟子意自以當之鄒魯相鄰故曰近聖人之居無乎爾有乎爾疑之也此意以况絶筆於獲麟也柝音託剖普后切孟子篇叙此趙氏述孟子七篇所以相次叙之意也其行下孟切下同當期音朞括古活切孟子音義巻下
